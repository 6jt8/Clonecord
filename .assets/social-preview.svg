<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d14"/>
      <stop offset="50%" stop-color="#13131f"/>
      <stop offset="100%" stop-color="#0d0d14"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="iconShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#3b82f6" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>

  <!-- Top line -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#g1)"/>

  <!-- Logo icon (centered) -->
  <g transform="translate(540, 140)" filter="url(#iconShadow)">
    <rect width="200" height="200" rx="40" fill="#1a1a2e" stroke="url(#g2)" stroke-width="2.5"/>
    <path d="M58 58 L142 58 L100 142 Z" fill="url(#g2)"/>
    <path d="M100 25 L175 100 L100 175 L25 100 Z" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-dasharray="10 5" opacity="0.4"/>
  </g>

  <!-- CLONECORD text (centered below icon) -->
  <text x="640" y="420" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff" text-anchor="middle" filter="url(#glow)" letter-spacing="8">CLONECORD</text>

  <!-- Tagline -->
  <text x="640" y="465" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#555570" text-anchor="middle" letter-spacing="4">DISCORD SERVER CLONER</text>

  <!-- Divider -->
  <rect x="440" y="500" width="400" height="2" rx="1" fill="url(#g1)" opacity="0.3"/>

  <!-- URL -->
  <text x="640" y="540" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#444460" text-anchor="middle" letter-spacing="1">github.com/6jt8/Clonecord</text>

  <!-- Bottom line -->
  <rect x="0" y="637" width="1280" height="3" fill="url(#g1)"/>
</svg>
