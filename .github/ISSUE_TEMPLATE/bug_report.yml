name: Bug Report
description: Report a bug or unexpected behavior in Clonecord
labels: ["bug"]
body:
    - type: markdown
      attributes:
          value: |
              Thanks for taking the time to report a bug. Please fill out the information below to help us investigate the issue.

    - type: textarea
      id: description
      attributes:
          label: Description
          description: A clear and concise description of what the bug is.
          placeholder: Describe the bug...
      validations:
          required: true

    - type: textarea
      id: steps
      attributes:
          label: Steps to Reproduce
          description: Step-by-step instructions to reproduce the behavior.
          placeholder: |
              1. Go to '...'
              2. Click on '...'
              3. See error
      validations:
          required: true

    - type: textarea
      id: expected
      attributes:
          label: Expected Behavior
          description: What you expected to happen.
          placeholder: Describe the expected behavior...
      validations:
          required: true

    - type: textarea
      id: actual
      attributes:
          label: Actual Behavior
          description: What actually happened.
          placeholder: Describe the actual behavior...
      validations:
          required: true

    - type: input
      id: vencord-version
      attributes:
          label: Vencord Version
          description: "You can find this in Settings > Vencord."
          placeholder: e.g. 1.10.7
      validations:
          required: true

    - type: input
      id: plugin-version
      attributes:
          label: Plugin Version
          description: "You can find this in the plugin settings."
          placeholder: e.g. 1.0.0
      validations:
          required: true

    - type: dropdown
      id: discord-client
      attributes:
          label: Discord Client
          options:
              - Desktop (Official)
              - Browser
              - Vesktop
      validations:
          required: true

    - type: input
      id: os
      attributes:
          label: Operating System
          placeholder: e.g. Windows 11, macOS 14, Ubuntu 24.04
      validations:
          required: true

    - type: textarea
      id: screenshots
      attributes:
          label: Screenshots
          description: If applicable, add screenshots to help explain the problem.
          placeholder: Drag and drop screenshots here...
      validations:
          required: false

    - type: textarea
      id: context
      attributes:
          label: Additional Context
          description: Add any other context about the problem here (console errors, logs, etc.).
          placeholder: Add any additional context...
      validations:
          required: false
